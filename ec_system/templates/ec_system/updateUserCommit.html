<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>会員情報の更新完了</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <main class="container py-5" style="max-width: 640px;">
            <div class="alert alert-success">以下の会員情報で更新しました。</div>

            <div class="card shadow-sm mb-4">
                <table class="table table-bordered mb-0">
                    <tbody>
                        <tr>
                            <th class="table-light w-25">会員ID</th>
                            <td>{{ login_user.user_id }}</td>
                        </tr>
                        <tr>
                            <th class="table-light">パスワード</th>
                            <td>表示なし</td>
                        </tr>
                        <tr>
                            <th class="table-light">お名前</th>
                            <td>{{ login_user.name }}</td>
                        </tr>
                        <tr>
                            <th class="table-light">ご住所</th>
                            <td>{{ login_user.address }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <a href="{% url 'ec_system:index' %}" class="btn btn-outline-secondary">商品検索へ</a>
        </main>
    </body>
</html>
